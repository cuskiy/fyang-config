name: CI
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30

      - name: Flake check
        run: nix flake check --no-build

      - name: Evaluate configurations
        run: |
          for node in $(nix eval .#nixosConfigurations --apply 'x: builtins.concatStringsSep " " (builtins.attrNames x)' --raw); do
            echo "--- $node ---"
            nix eval .#nixosConfigurations.$node.config.system.build.toplevel.drvPath --raw > /dev/null
          done

      - name: Check formatting
        run: nix fmt .
